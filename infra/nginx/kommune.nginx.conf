server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  location = / {
    return 302 /kommune/;
  }

  location = /kommune {
    return 301 /kommune/;
  }

  location = /kommune/healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"kommune-frontend"}';
  }

  location = /kommune/readyz {
    proxy_pass http://kommune-backend:3000/kommune/api/readyz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /kommune;
  }

  location /kommune/api/ {
    proxy_pass http://kommune-backend:3000/kommune/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /kommune;
  }

  location /kommune/assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location /kommune/ {
    try_files $uri $uri/ /kommune/index.html;
  }
}
